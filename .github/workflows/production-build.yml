# production-build.yml

name: Production 빌드 (Staged 배포)
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
jobs:
  Build-And-Stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm run test
      - run: npm install --global vercel@latest

      - name: Vercel 환경 정보 가져오기 (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 프로젝트 빌드 (production 설정)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Staged production으로 배포 (도메인 미할당)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --skip-domain --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "$DEPLOY_URL" > deployment-url.txt
          echo "Deployment URL: $DEPLOY_URL"

      - name: Deployment URL artifact로 업로드
        uses: actions/upload-artifact@v7
        with:
          name: deployment-url
          path: deployment-url.txt
          retention-days: 7

      - name: Summary에 표시
        run: |
          echo "## 🏗️ Staged Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "production 환경으로 빌드되었지만 메인 도메인은 아직 가리키지 않습니다." >> $GITHUB_STEP_SUMMARY
          echo "production-promote.yml을 실행하면 도메인이 즉시 전환됩니다 (리빌드 없음)." >> $GITHUB_STEP_SUMMARY
