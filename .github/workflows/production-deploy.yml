# production-promote.yml

name: Production으로 승격
on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: 'Promote할 Vercel deployment URL (비우면 최근 성공한 빌드 사용)'
        required: false
        type: string
      run_id:
        description: '특정 빌드의 Run ID 사용 (deployment_url이 비었을 때만 의미 있음)'
        required: false
        type: string
jobs:
  Promote-To-Production:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Vercel CLI 설치
        run: npm install --global vercel@latest

      - name: Deployment URL 다운로드 (특정 Run ID)
        if: ${{ inputs.deployment_url == '' && inputs.run_id != '' }}
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: deployment-url
          run_id: ${{ inputs.run_id }}

      - name: Deployment URL 다운로드 (최근 성공 빌드)
        if: ${{ inputs.deployment_url == '' && inputs.run_id == '' }}
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: production-build.yml
          name: deployment-url
          workflow_conclusion: success

      - name: Promote할 URL 결정
        id: resolve
        env:
          INPUT_URL: ${{ inputs.deployment_url }}
        run: |
          if [ -n "$INPUT_URL" ]; then
            URL="$INPUT_URL"
          else
            URL=$(cat deployment-url.txt)
          fi
          if [ -z "$URL" ]; then
            echo "Promote할 URL을 찾을 수 없습니다." >&2
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Promote할 URL: $URL"

      - name: Production으로 promote
        run: vercel promote ${{ steps.resolve.outputs.url }} --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Summary에 표시
        run: |
          echo "## ✅ Production 도메인 전환 완료" >> $GITHUB_STEP_SUMMARY
          echo "**Promoted URL**: ${{ steps.resolve.outputs.url }}" >> $GITHUB_STEP_SUMMARY
